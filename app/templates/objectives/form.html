{% extends "base.html" %}

{% block title %}{% if objective %}Edit{% else %}New{% endif %} objective — Tracks{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{% if objective %}Edit objective{% else %}New objective{% endif %}</h1>
</div>

<form class="activity-form" method="post" action="{{ form_action }}">
  <label class="form-field">
    <span class="field-label">Label (optional)</span>
    <input type="text" name="label" value="{{ objective.label if objective and objective.label else '' }}"
           placeholder="e.g. Summer hiking goal">
  </label>

  <div class="form-grid">
    <label class="form-field">
      <span class="field-label">Activity type</span>
      <select name="activity_type" id="activity-type-select" required>
        <option value="any"{% if objective and objective.activity_type.value == 'any' %} selected{% endif %}>Any</option>
        <option value="hike"{% if objective and objective.activity_type.value == 'hike' %} selected{% endif %}>Hikes only</option>
        <option value="bike"{% if objective and objective.activity_type.value == 'bike' %} selected{% endif %}>Bike only</option>
        <option value="skitouring"{% if objective and objective.activity_type.value == 'skitouring' %} selected{% endif %}>Ski touring only</option>
        <option value="climbing"{% if objective and objective.activity_type.value == 'climbing' %} selected{% endif %}>Climbing only</option>
        <option value="swimming"{% if objective and objective.activity_type.value == 'swimming' %} selected{% endif %}>Swimming only</option>
      </select>
    </label>

    <label class="form-field">
      <span class="field-label">Metric</span>
      <select name="metric" id="metric-select" required>
        <option value="distance_km" data-track-metric="1"{% if objective and objective.metric.value == 'distance_km' %} selected{% endif %}>Distance (km)</option>
        <option value="duration_hours" data-track-metric="1"{% if objective and objective.metric.value == 'duration_hours' %} selected{% endif %}>Duration (hours)</option>
        <option value="elevation_gain_m" data-track-metric="1"{% if objective and objective.metric.value == 'elevation_gain_m' %} selected{% endif %}>Elevation (m)</option>
        <option value="activity_count"{% if objective and objective.metric.value == 'activity_count' %} selected{% endif %}>Activity count</option>
      </select>
    </label>

    <label class="form-field">
      <span class="field-label">Target</span>
      <input type="number" name="target_value" step="any" min="0.1" required
             value="{{ objective.target_value if objective else '' }}">
    </label>

    <label class="form-field">
      <span class="field-label">Period</span>
      <select name="period" id="period-select" required>
        <option value="month"{% if objective and objective.period.value == 'month' %} selected{% endif %}>This month</option>
        <option value="year"{% if objective and objective.period.value == 'year' %} selected{% endif %}>This year</option>
        <option value="custom"{% if objective and objective.period.value == 'custom' %} selected{% endif %}>Custom range</option>
      </select>
    </label>
  </div>

  <div id="custom-dates" class="form-grid" style="{% if not objective or objective.period.value != 'custom' %}display:none{% endif %}">
    <label class="form-field">
      <span class="field-label">Start date</span>
      <input type="date" name="start_date"
             value="{{ objective.start_date.isoformat() if objective else '' }}">
    </label>
    <label class="form-field">
      <span class="field-label">End date</span>
      <input type="date" name="end_date"
             value="{{ objective.end_date.isoformat() if objective else '' }}">
    </label>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="/objectives" class="btn btn-secondary">Cancel</a>
  </div>
</form>

{% if objective %}
<form method="post" action="/objectives/{{ objective.id }}/delete" class="objective-delete-form"
      onsubmit="return confirm('Delete this objective?')">
  <button type="submit" class="btn btn-danger">Delete objective</button>
</form>
{% endif %}

<script>
(function () {
  const typeSelect = document.getElementById('activity-type-select');
  const metricSelect = document.getElementById('metric-select');
  const periodSelect = document.getElementById('period-select');
  const customDates = document.getElementById('custom-dates');

  function syncMetrics() {
    const type = typeSelect.value;
    const climbingOnly = type === 'climbing';
    const noElevation = type === 'climbing' || type === 'swimming';

    for (const option of metricSelect.options) {
      if (option.dataset.trackMetric) {
        option.hidden = climbingOnly;
        option.disabled = climbingOnly;
      }
      if (option.value === 'elevation_gain_m') {
        option.hidden = noElevation;
        option.disabled = noElevation;
      }
    }

    if (climbingOnly && metricSelect.value !== 'activity_count') {
      metricSelect.value = 'activity_count';
    }
    if (noElevation && metricSelect.value === 'elevation_gain_m') {
      metricSelect.value = 'activity_count';
    }
  }

  typeSelect.addEventListener('change', syncMetrics);
  periodSelect.addEventListener('change', function () {
    customDates.style.display = this.value === 'custom' ? 'grid' : 'none';
  });

  syncMetrics();
})();
</script>
{% endblock %}
