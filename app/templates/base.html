<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tracks{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="top-nav">
    <a href="/" class="brand">Tracks</a>
    <nav class="nav-links">
      <a href="/" class="nav-link{% if active_nav == 'dashboard' %} active{% endif %}">Dashboard</a>
      <a href="/activities" class="nav-link{% if active_nav == 'activities' %} active{% endif %}">Activities</a>
      <a href="/objectives" class="nav-link{% if active_nav == 'objectives' %} active{% endif %}">Objectives</a>
      <a href="/stats" class="nav-link{% if active_nav == 'stats' %} active{% endif %}">Stats</a>
    </nav>
  </header>

  <main class="main-content">
    {% if flash %}
    <div class="flash flash-{{ flash.type }}" role="status">{{ flash.message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="/" class="bottom-nav-link{% if active_nav == 'dashboard' %} active{% endif %}">
      <span class="nav-icon" aria-hidden="true">⌂</span>
      <span>Home</span>
    </a>
    <a href="/activities" class="bottom-nav-link{% if active_nav == 'activities' %} active{% endif %}">
      <span class="nav-icon" aria-hidden="true">≡</span>
      <span>Activities</span>
    </a>
    <a href="/objectives" class="bottom-nav-link{% if active_nav == 'objectives' %} active{% endif %}">
      <span class="nav-icon" aria-hidden="true">◎</span>
      <span>Goals</span>
    </a>
    <a href="/stats" class="bottom-nav-link{% if active_nav == 'stats' %} active{% endif %}">
      <span class="nav-icon" aria-hidden="true">▤</span>
      <span>Stats</span>
    </a>
  </nav>

  {% block scripts %}{% endblock %}
</body>
</html>
